<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- DISABLE PHONE NUMBER DETECTION -->
  <meta name="format-detection" content="telephone=no">
  
  <title>Keyboard Warrior</title>
  <style>
    body {
      margin: 0;
      font-family: 'Comic Sans MS', 'Poppins', sans-serif;
      background: #EAF6FF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

.game-container {
  background: white;
  width: min(90vw, 700px);
  padding: clamp(20px, 4vw, 40px);
  border-radius: 20px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
  text-align: center;
}

    h1 {
      margin-top: 0;
      color: #4A90E2;
      font-size: 36px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 20px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      background: #FFF8DC;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .word-display {
  background: #F9F9F9;
  border: 3px dashed #A0D8EF;
  border-radius: 20px;
  padding: 20px 10px;
  font-size: clamp(20px, 6vw, 64px);
  font-weight: bold;
  color: #333;
  margin-bottom: 20px;
}

input {
  display: block;              /* makes centering work properly */
  margin: 0 auto 20px auto;    /* centers horizontally */
  width: min(90%, 500px);

  padding: 15px;
  font-size: clamp(16px, 2vw, 24px);

  border: 2px solid #A0D8EF;
  border-radius: 15px;
  outline: none;

  text-align: center;          /* text inside also centered */
  box-sizing: border-box;
}

    input:focus {
      border-color: #4A90E2;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

   button {
  padding: clamp(10px, 2vw, 18px) clamp(20px, 4vw, 36px);
  font-size: clamp(14px, 2vw, 20px);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

    .start-btn {
      background: #7ED957;
      color: white;
    }

    .restart-btn {
      background: #FFB347;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }

    .message {
      min-height: 30px;
      font-size: 20px;
      font-weight: bold;
      color: #4A90E2;
    }
    
    .keyboard-toggle {
  margin-bottom: 15px;
}

.toggle-btn {
  background: #4A90E2;
  color: white;
  border: none;
  padding: 12px 24px;
  font-size: 18px;
  font-weight: bold;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
}

.toggle-btn:hover {
  transform: scale(1.05);
}
.keyboard {
  display: none;
  margin-bottom: 20px;
  width: 100%;
  overflow-x: auto;
}

.keyboard-row {
  display: flex;
  justify-content: center;
  gap: clamp(4px, 1vw, 10px);
  margin-bottom: 8px;
  flex-wrap: nowrap;
}

.key {
  width: clamp(32px, 5vw, 55px);
  height: clamp(32px, 5vw, 55px);
  min-width: 32px;
  min-height: 32px;
  background: #f0f0f0;
  border: 2px solid #A0D8EF;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: clamp(14px, 2vw, 20px);
  transition: 0.2s;
  flex-shrink: 0;
}

.key.active {
  background: #4A90E2;
  color: white;
  transform: scale(1.08);
}

.key.wrong {
  background: #FF6B6B;
  color: white;
  transform: scale(1.08);
}

.mode-select {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 15px;
}

.mode-btn {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #ddd;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

.mode-btn.active {
  background: #4A90E2;
  color: white;
  
  .end-btn {
  background: #FF6B6B;
  color: white;
}
}

.correct-letter {
  color: #4A90E2;
  font-weight: bold;
}

@media (max-width: 600px) {
  .stats {
    flex-direction: column;
    gap: 10px;
    font-size: 18px;
  }

  .buttons {
    flex-direction: column;
  }

  .keyboard-row {
    gap: 4px;
  }

  .key {
    width: 35px;
    height: 35px;
    font-size: 14px;
  }
}

/* OPEN BUTTON */

#openMenuBtn {
  position: fixed;

  top: 20px;
  right: 20px;

  z-index: 1001;

  padding: 12px 18px;

  border: none;
  border-radius: 12px;

  background: #4A90E2;
  color: white;

  font-size: 18px;
  font-weight: bold;

  cursor: pointer;
}

/* OVERLAY */

#overlay {
  position: fixed;

  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.4);

  opacity: 0;
  visibility: hidden;

  transition: 0.3s;

  z-index: 998;
}

/* SIDE MENU */

#sideMenu {
  position: fixed;

  top: 0;
  right: -350px;

  width: min(90vw, 320px);
  height: 100vh;

  background: white;

  box-shadow: -5px 0 20px rgba(0,0,0,0.15);

  transition: right 0.3s ease;

  z-index: 999;

  padding: 20px;

  box-sizing: border-box;
}

/* OPEN STATE */

#sideMenu.open {
  right: 0;
}

#overlay.open {
  opacity: 1;
  visibility: visible;
}

/* HEADER */

.menu-header {
  display: flex;

  justify-content: space-between;
  align-items: center;

  margin-bottom: 20px;
}


/* CONTENT */

.menu-content {
  display: flex;
  flex-direction: column;

  gap: 15px;
}

.menu-content button {
  padding: 14px;

  border: none;
  border-radius: 12px;

  background: #EAF6FF;

  font-size: 18px;
  font-weight: bold;

  cursor: pointer;
}

/* FLOATING TROPHY BUTTON */

#leaderboardBtn {
  position: fixed;
  
  display: flex;
  align-items: center;
  justify-content: flex-start;

  padding-left: 10px;

  left: -2px;
  top: 50%;
  
  z-index: 1001;
  
  transform: translateY(-50%);
  padding: 12px 18px;

  width: 50px;
  height: 65px;

  border: none;
  border-radius: 0 12px 12px 0;

  background: #FFFFFF;
  color: white;

  font-size: 22px;

  cursor: pointer;

box-shadow: 3px 0 4px rgba(0,0,0,0.15);



  transition:
    left 0.3s ease,
    transform 0.2s ease;
    
    
}

/* MOVE BUTTON WITH PANEL */

#leaderboardBtn.open {
  left: min(90vw, 350px);
}

#leaderboardBtn:hover {
  transform: translateY(-50%) scale(1.08);
}

#leaderboardBtn:hover {
  transform: translateY(-50%) scale(1.08);
}

/* OVERLAY */

#leaderboardOverlay {
  position: fixed;

  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.35);

  opacity: 0;
  visibility: hidden;

  transition: 0.3s;

  z-index: 998;
}

/* PANEL */

#leaderboardPanel {
  position: fixed;

  top: 0;
  left: -400px;

  width: min(90vw, 350px);
  height: 100vh;

  background: white;

  box-shadow: 5px 0 20px rgba(0,0,0,0.15);

  transition: left 0.3s ease;

  z-index: 999;

  padding: 20px;

  box-sizing: border-box;

  overflow-y: auto;
}

/* OPEN STATE */

#leaderboardPanel.open {
  left: 0;
}

#leaderboardOverlay.open {
  opacity: 1;
  visibility: visible;
}

/* HEADER */

.leaderboard-header {
  text-align: center;

  margin-bottom: 20px;
}

.leaderboard-header h2 {
  color: #4A90E2;
}

/* MODE TABS */

.leaderboard-tabs {
  display: flex;

  gap: 10px;

  margin-bottom: 20px;
}

.leaderboard-tab {
  flex: 1;

  padding: 10px;

  border: none;
  border-radius: 10px;

  background: #EAF6FF;

  cursor: pointer;

  font-weight: bold;
}

.leaderboard-tab.active {
  background: #4A90E2;
  color: white;
}

/* ENTRIES */

.leaderboard-entry {
  display: flex;

  justify-content: space-between;
  align-items: center;

  background: #F9F9F9;

  padding: 12px;

  border-radius: 10px;

  margin-bottom: 10px;

  font-size: 18px;
  font-weight: bold;
}

/* LOADING SPINNER */

.loader {
  width: 45px;
  height: 45px;

  border: 5px solid #EAF6FF;
  border-top: 5px solid #4A90E2;

  border-radius: 50%;

  animation: spin 1s linear infinite;

  margin: 40px auto;
}

@keyframes spin {
  from {
    transform: rotate(0deg);
  }

  to {
    transform: rotate(360deg);
  }
}

/* NAME SCREEN */

#nameScreen {
  display: flex;
  flex-direction: column;

  align-items: center;
  justify-content: center;

  gap: 15px;

  margin-top: 20px;
}

#playerNameInput {
  width: 80%;

  padding: 15px;

  font-size: 20px;

  border: 2px solid #A0D8EF;
  border-radius: 15px;

  outline: none;

  text-align: center;
}
  </style>
</head>
<body>

  <div class="game-container">
    <h1>⚔️ Keyboard Warrior ⚔️</h1>
    <p class="subtitle">Type as fast as you can!</p>
<!-- NAME SCREEN -->

<div id="nameScreen">

  <h2>Enter Your Name</h2>

  <input
    type="text"
    inputmode="none"
    id="playerNameInput"
    placeholder="Your name..."
    maxlength="12"
    autocomplete="off"
  >

</div>
    <div class="stats" id='stats'>
      <div>⭐ Score: <span id="score">0</span></div>
      <div>⏰ Time: <span id="time">60</span>s</div>
    </div>

    <div class="word-display" id="wordDisplay">
      Ready?
    </div>

    <input
      type="text"
      id="wordInput"
      placeholder="Type the word here..."
      autocomplete="off"
      spellcheck="false"
      autocorrect="off"
      inputmode="none"
      style="ime-mode: disabled; display: none"
    >
    <div class="keyboard-toggle">
  <button id="toggleKeyboardBtn" class="toggle-btn">
    ⌨️ Show Keyboard
  </button>
</div>

<div class="keyboard" id="keyboard">
  <div class="keyboard-row">
    <div class="key" data-key="q">Q</div>
    <div class="key" data-key="w">W</div>
    <div class="key" data-key="e">E</div>
    <div class="key" data-key="r">R</div>
    <div class="key" data-key="t">T</div>
    <div class="key" data-key="y">Y</div>
    <div class="key" data-key="u">U</div>
    <div class="key" data-key="i">I</div>
    <div class="key" data-key="o">O</div>
    <div class="key" data-key="p">P</div>
  </div>

  <div class="keyboard-row">
    <div class="key" data-key="a">A</div>
    <div class="key" data-key="s">S</div>
    <div class="key" data-key="d">D</div>
    <div class="key" data-key="f">F</div>
    <div class="key" data-key="g">G</div>
    <div class="key" data-key="h">H</div>
    <div class="key" data-key="j">J</div>
    <div class="key" data-key="k">K</div>
    <div class="key" data-key="l">L</div>
  </div>

  <div class="keyboard-row">
    <div class="key" data-key="z">Z</div>
    <div class="key" data-key="x">X</div>
    <div class="key" data-key="c">C</div>
    <div class="key" data-key="v">V</div>
    <div class="key" data-key="b">B</div>
    <div class="key" data-key="n">N</div>
    <div class="key" data-key="m">M</div>
  </div>
</div>

<div class="mode-select" id = "modeSelect">
  <button class="mode-btn active" onclick="setMode('alphabet')">🔤 Alphabets</button>
  <button class="mode-btn" onclick="setMode('words')">📖 Words</button>
</div>

<div class="buttons" id ="startButton">
  <button class="start-btn" onclick="startGame()">🟢 Start Game</button>

  <button
    class="end-btn"
    onclick="forceEndGame()"
    style="display: none;"
  >
    🛑 End Game
  </button>
</div>

    <div class="message" id="message">
      🎉 Great job! Keep going!
    </div>
  </div>
<!-- OPEN MENU BUTTON -->

<button id="openMenuBtn" style="display: none;">
  ☰ Menu
</button>

<!-- DARK OVERLAY -->

<div id="overlay"></div>

<!-- SIDE MENU -->

<div id="sideMenu">

  <div class="menu-header">

    <h2>Menu</h2>


  </div>

  <div class="menu-content">

    <button>Settings</button>

    <button>Scores</button>

    <button>Help</button>

  </div>

</div>

<!-- FLOATING TROPHY BUTTON -->

<button id="leaderboardBtn">
  <span class="trophy-icon">🏆</span>
</button>

<!-- OVERLAY -->

<div id="leaderboardOverlay"></div>

<!-- LEADERBOARD PANEL -->

<div id="leaderboardPanel">

  <div class="leaderboard-header">

    <h2>🏆 Leaderboard</h2>
  <div class="leaderboard-tabs">

    <button
      class="leaderboard-tab active"
      onclick="switchLeaderboardMode('alphabet')"
    >
      🔤 Alphabets
    </button>

    <button
      class="leaderboard-tab"
      onclick="switchLeaderboardMode('words')"
    >
      📖 Words
    </button>
  </div>


<div id="leaderboardList"></div>


  <!-- MODE TABS -->



  </div>
  <!--loader-->
  <div id="leaderboardLoading" class="loader"></div>
  <!-- SCORES -->
  

  <div id="leaderboardList"></div>

</div>

</body>



  <script src="script.js"></script>
</body>
</html>
